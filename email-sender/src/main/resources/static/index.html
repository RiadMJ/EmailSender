<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sender</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
        }
        input, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box; 
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        #status {
            margin-top: 1rem;
            text-align: center;
        }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Email Sender</h1>
        <form id="emailForm">
            <div class="form-group">
                <label>To</label>
                <input type="email" id="to" required placeholder="recipient@example.com">
            </div>
            <div class="form-group">
                <label>Subject</label>
                <input type="text" id="subject" required placeholder="Hello!">
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea id="body" rows="4" required placeholder="Your message here..."></textarea>
            </div>
            <button type="submit" id="sendBtn">Send Email</button>
        </form>
        <div id="status"></div>
    </div>

    <script>
        document.getElementById('emailForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('sendBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.textContent = 'Sending...';
            status.textContent = '';

            const data = {
                to: document.getElementById('to').value,
                subject: document.getElementById('subject').value,
                body: document.getElementById('body').value
            };

            try {
                const response = await fetch('/api/email/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    status.textContent = '✅ Email sent successfully!';
                    status.className = 'success';
                    e.target.reset();
                } else {
                    throw new Error(result.message || 'Failed to send');
                }
            } catch (error) {
                status.textContent = '❌ Error: ' + error.message;
                status.className = 'error';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Email';
            }
        });
    </script>
</body>
</html>
